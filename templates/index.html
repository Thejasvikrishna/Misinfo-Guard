{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Misinfo Guard | Professional AI Fact-Checking</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            /* Safari Support */
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px); 
        }
        
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Valid CSS focus effect (replacing 'ring') */
        .input-focus:focus { 
            border-color: #2563eb; 
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8">
    
    <div class="max-w-2xl w-full glass rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden border border-white">
        
        <div class="bg-white p-8 text-center border-b border-slate-100">
            <div class="mb-4 flex justify-center">
                <img src="{% static 'images/logo.png' %}" 
                     alt="Misinfo Guard Logo" 
                     title="Misinfo Guard Logo"
                     class="h-12 object-contain"width="2000" height="2000">
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Misinfo Guard <span class="text-blue-600"></span></h1>
            <p class="text-slate-500 text-sm mt-1">Real-time Fact Verification Engine</p>
        </div>
        
        <div class="p-8">
            <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-8">
                <button onclick="setMode('text')" id="b-text" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 bg-white shadow-sm text-blue-600">Text</button>
                <button onclick="setMode('image')" id="b-image" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500">Social Image</button>
                <button onclick="setMode('url')" id="b-url" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500">News Link</button>
            </div>
            <div id="inputs" class="space-y-4">
                <textarea id="in-text" class="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl h-40 outline-none transition-all input-focus text-slate-700" placeholder="Paste a claim or social media post text..."></textarea>
                
                <div id="in-image-container" class="hidden">
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-slate-200 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-3 text-slate-400" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <p id="upload-text" class="text-sm text-slate-500"><span class="font-semibold">Click to upload</span> screenshot</p>
                            </div>
                            <input type="file" id="in-image" accept="image/*" class="hidden" onchange="document.getElementById('upload-text').innerHTML = '<span class=\'font-bold text-blue-600\'>File selected:</span> ' + this.files[0].name" />
                        </label>
                    </div>
                </div>

                <input type="url" id="in-url" class="hidden w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none input-focus" placeholder="https://news-link.com">
            </div>
            <div class="mb-6">
    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider text-center">Event Timeframe</label>
    <div class="flex p-1.5 bg-slate-100 rounded-2xl">
        <button type="button" id="btn-tf-current" onclick="setTimeframe('current')" class="flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 bg-white shadow-sm text-blue-600">
            Ongoing / Current
        </button>
        <button type="button" id="btn-tf-historical" onclick="setTimeframe('historical')" class="flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500 hover:text-slate-700">
            Past / Historical
        </button>
    </div>
</div>

    <button title="button "id="b-submit" ...>
            <button onclick="verify()" id="goBtn" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-[0_10px_20px_rgba(37,99,235,0.3)] transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>Start AI Analysis</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </button>

            <div id="loading" class="hidden mt-10 text-center">
                <div class="loader w-12 h-12 border-4 border-slate-100 rounded-full mx-auto mb-4"></div>
                <div class="space-y-1">
                    <p class="text-blue-600 font-bold tracking-wide uppercase text-xs">Scanning Verified Sources</p>
                    <p class="text-slate-400 text-xs italic">Consulting Llama  & Web Index...</p>
                </div>
            </div>

            <div id="result" class="hidden mt-10 pt-10 border-t border-slate-100">
                <div class="flex items-center justify-between mb-6">
                    <div id="r-stance-badge" class="px-4 py-1.5 rounded-full text-sm font-black tracking-widest uppercase">
                        <span id="r-stance"></span>
                    </div>
                    <span id="r-conf" class="text-xs font-bold py-1.5 px-3 bg-slate-900 text-white rounded-lg"></span>
                </div>
                <div class="bg-blue-50/50 p-6 rounded-2xl mb-6">
                    <p id="r-explain" class="text-slate-700 leading-relaxed text-md font-medium"></p>
                </div>

                <div>
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4">Evidence Citations</h4>
                    <div id="r-sources" class="grid gap-3"></div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        let mode = 'text';
        let selectedTimeframe = 'current'; // 1. Global variable to store timeframe state

        // 2. The missing function to handle the Timeframe button animations
        function setTimeframe(tf) {
            selectedTimeframe = tf;
            const btnCurrent = document.getElementById('btn-tf-current');
            const btnHistorical = document.getElementById('btn-tf-historical');

            if (tf === 'current') {
                btnCurrent.className = "flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 bg-white shadow-sm text-blue-600";
                btnHistorical.className = "flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500 hover:text-slate-700";
            } else {
                btnHistorical.className = "flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 bg-white shadow-sm text-blue-600";
                btnCurrent.className = "flex-1 py-2 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500 hover:text-slate-700";
            }
        }
        function setMode(m) {
            // UI CLEANUP
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loading').classList.add('hidden');
            
            document.getElementById('r-stance').innerText = "";
            document.getElementById('r-explain').innerText = "";
            document.getElementById('r-conf').innerText = "";
            document.getElementById('r-sources').innerHTML = "";
            
            const fileInput = document.querySelector('#in-image-container input[type="file"]') || document.getElementById('in-image');
            if (fileInput) fileInput.value = ""; 

            const fileLabel = document.querySelector('#in-image-container p') || document.querySelector('#in-image-container span') || document.getElementById('file-upload-label');
            if (fileLabel) fileLabel.innerText = "Drag and drop your screenshot here, or click to browse";

            resetUI();

            // SWITCH TAB MODE LOGIC
            mode = m;
            const modes = ['text', 'image', 'url'];
            modes.forEach(x => {
                const inputEl = x === 'image' ? document.getElementById('in-image-container') : document.getElementById('in-'+x);
                const btnEl = document.getElementById('b-'+x);
                
                if (x === m) {
                    inputEl.classList.remove('hidden');
                    btnEl.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 bg-white shadow-sm text-blue-600";
                    if(x !== 'image' && inputEl) inputEl.focus();
                } else {
                    inputEl.classList.add('hidden');
                    btnEl.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500 hover:text-slate-700";
                    if(x !== 'image' && inputEl) inputEl.value = "";
                }
            });
        }

        async function verify() {
            const fd = new FormData();
            fd.append('claim_type', mode);
            
            // 3. Append the timeframe state here alongside the other data!
            fd.append('timeframe', selectedTimeframe); 

            if (mode === 'text') fd.append('claim_text', document.getElementById('in-text').value);
            else if (mode === 'url') fd.append('claim_text', document.getElementById('in-url').value);
            else if (mode === 'image') {
                const fileInput = document.getElementById('in-image');
                if (fileInput.files.length > 0) fd.append('image', fileInput.files);
                else return alert("Select an image first");
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('goBtn').disabled = true;
            document.getElementById('goBtn').classList.add('opacity-50');

            try {
                const res = await fetch('/api/v1/claims/', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (!res.ok) {
                    alert("Upload Error: " + JSON.stringify(data));
                    resetUI();
                    return;
                }
                
                poll(data.id);
            } catch (e) {
                alert("Server connection failed: " + e.message);
                resetUI();
            }
        }

        async function poll(id) {
            const interval = setInterval(async () => {
                const r = await fetch(`/api/v1/claims/${id}/`);
                const d = await r.json();
                if (d.status === 'COMPLETED') {
                    clearInterval(interval);
                    show(d);
                }
            }, 1500);
        }

        async function sendFeedback(id, value) {
            try {
                const response = await fetch(`/api/v1/claims/${id}/feedback/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_correct: value })
                });
                const data = await response.json();
                if (response.ok) alert("Thank you! Your feedback helps Misinfo Guard improve.");
                else alert("Feedback failed: " + (data.error || "Unknown error"));
            } catch (error) {
                console.error("Network Error:", error);
            }
        }
