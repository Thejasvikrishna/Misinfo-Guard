{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Misinfo Guard | Professional AI Fact-Checking</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            /* Safari Support */
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px); 
        }
        
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Valid CSS focus effect (replacing 'ring') */
        .input-focus:focus { 
            border-color: #2563eb; 
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8">
    
    <div class="max-w-2xl w-full glass rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden border border-white">
        
        <div class="bg-white p-8 text-center border-b border-slate-100">
            <div class="mb-4 flex justify-center">
                <img src="{% static 'images/logo.png' %}" 
                     alt="Misinfo Guard Logo" 
                     title="Misinfo Guard Logo"
                     class="h-12 object-contain"width="2000" height="2000">
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Misinfo Guard <span class="text-blue-600"></span></h1>
            <p class="text-slate-500 text-sm mt-1">Real-time Fact Verification Engine</p>
        </div>
        
        <div class="p-8">
            <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-8">
                <button onclick="setMode('text')" id="b-text" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 bg-white shadow-sm text-blue-600">Text</button>
                <button onclick="setMode('image')" id="b-image" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500">Social Image</button>
                <button onclick="setMode('url')" id="b-url" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all duration-200 text-slate-500">News Link</button>
            </div>
